  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const createMotionFallback = () => {
      const strip = (Tag) => React.forwardRef(({ initial, animate, exit, whileInView, viewport, transition, variants, whileHover, whileTap, layout, ...props }, ref) => (
        <Tag ref={ref} {...props} />
      ));
      return new Proxy({}, { get: (_, tag) => strip(tag) });
    };

    const framer = window.Motion || window.FramerMotion || window.framerMotion;
    const motion = framer && framer.motion ? framer.motion : createMotionFallback();
    const AnimatePresence = framer && framer.AnimatePresence
      ? framer.AnimatePresence
      : ({ children }) => <>{children}</>;

    const ease = [0.22, 1, 0.36, 1];

    function useReducedMotionSafe() {
      const [reduced, setReduced] = useState(false);

      useEffect(() => {
        const query = window.matchMedia("(prefers-reduced-motion: reduce)");
        const sync = () => setReduced(query.matches);
        sync();
        if (query.addEventListener) {
          query.addEventListener("change", sync);
          return () => query.removeEventListener("change", sync);
        }
        query.addListener(sync);
        return () => query.removeListener(sync);
      }, []);

      return reduced;
    }

    function useMousePosition() {
      const [position, setPosition] = useState({ x: 0, y: 0 });

      useEffect(() => {
        const update = (event) => setPosition({ x: event.clientX, y: event.clientY });
        window.addEventListener("mousemove", update, { passive: true });
        return () => window.removeEventListener("mousemove", update);
      }, []);

      return position;
    }

    function useCountUp(target, start = false, duration = 1200) {
      const [value, setValue] = useState(0);

      useEffect(() => {
        if (!start) return;
        let frame = 0;
        let raf = 0;
        const startTime = performance.now();

        const tick = (now) => {
          const progress = Math.min((now - startTime) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          setValue(Math.round(target * eased));
          if (progress < 1) raf = requestAnimationFrame(tick);
        };

        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [duration, start, target]);

      return value;
    }

    function Reveal({ children, className = "", delay = 0, as = "div", ...props }) {
      const Component = motion[as];
      return (
        <Component
          initial={{ opacity: 0, y: 22 }}
          whileInView={{ opacity: 1, y: 0 }}
          viewport={{ once: true, amount: 0.18 }}
          transition={{ duration: 0.68, ease, delay }}
          className={className}
          {...props}
        >
          {children}
        </Component>
      );
    }

    function MagneticButton({ as = "a", className = "", children, href, onClick, light = false }) {
      const Component = as;
      const reduced = useReducedMotionSafe();
      const ref = useRef(null);

      const handleMove = (event) => {
        if (reduced || !ref.current) return;
        const rect = ref.current.getBoundingClientRect();
        const x = event.clientX - rect.left - rect.width / 2;
        const y = event.clientY - rect.top - rect.height / 2;
        ref.current.style.transform = `translate3d(${x * 0.12}px, ${y * 0.12}px, 0)`;
      };

      const reset = () => {
        if (ref.current) ref.current.style.transform = "translate3d(0, 0, 0)";
      };

      return (
        <Component
          ref={ref}
          href={href}
          onClick={onClick}
          onMouseMove={handleMove}
          onMouseLeave={reset}
          className={`magnetic-shell inline-flex items-center justify-center rounded-full px-7 py-4 text-sm font-extrabold transition duration-300 ${
            light
              ? "bg-white text-pixlup-ink hover:bg-pixlup-blue hover:text-white"
              : "border border-white/15 bg-white/[0.055] text-white hover:border-white/30 hover:bg-white/10"
          } ${className}`}
        >
          {children}
        </Component>
      );
    }

    function CustomCursor() {
      const reduced = useReducedMotionSafe();
      const { x, y } = useMousePosition();

      if (reduced) return null;

      return (
        <div className="custom-cursor hidden lg:block" aria-hidden="true">
          <motion.div
            className="custom-cursor__ring"
            animate={{ x, y }}
            transition={{ type: "spring", stiffness: 240, damping: 24, mass: 0.18 }}
          />
          <motion.div
            className="custom-cursor__dot"
            animate={{ x, y }}
            transition={{ type: "spring", stiffness: 540, damping: 32, mass: 0.08 }}
          />
        </div>
      );
    }

    function StatCounter({ value, suffix = "", label, delay = 0 }) {
      const [active, setActive] = useState(false);
      const count = useCountUp(value, active, 1200 + delay * 1000);

      return (
        <Reveal delay={delay} className="rounded-[24px] border border-white/10 bg-white/[0.05] p-4 backdrop-blur-xl">
          <motion.div
            onViewportEnter={() => setActive(true)}
            viewport={{ once: true, amount: 0.7 }}
          >
            <div className="text-3xl font-extrabold tracking-[-0.05em] text-white">

            <div className="mt-2 text-sm text-white/48">{label}</div>

    function ContactCTA() {
      const [status, setStatus] = useState({ type: "", message: "" });
      const [submitting, setSubmitting] = useState(false);
      const [formState, setFormState] = useState({
        name: "",
        business: "",
        email: "",
        consultation_topic: "Complete digital transformation",
        message: "",
        selected_services: []
      });

      const serviceOptions = [
        "Website Creation",
        "Branding",
        "Social Media",
        "Content Creation",
        "SEO",
        "Performance Marketing"
      ];

      const handleFieldChange = (event) => {
        const { name, value } = event.target;
        setFormState((current) => ({ ...current, [name]: value }));
      };

      const toggleService = (service) => {
        setFormState((current) => ({
          ...current,
          selected_services: current.selected_services.includes(service)
            ? current.selected_services.filter((item) => item !== service)
            : [...current.selected_services, service]
        }));
      };

      const buildGmailDraft = (data, fromForm = false) => {
        const name = String(data.name || "").trim();
        const business = String(data.business || "").trim();
        const email = String(data.email || "").trim();
        const topic = String(data.consultation_topic || "Website Creation").trim();
        const message = String(data.message || "").trim();
        const services = Array.isArray(data.selected_services) ? data.selected_services : [];

        const intro = name
          ? `Hi PixlUP team, ${name} would like to consult you for ${topic.toLowerCase()}.`
          : `Hi PixlUP team, we want to consult you for ${topic.toLowerCase()}.`;

        const servicesLine = services.length
          ? `We are interested in: ${services.join(", ")}.`
          : "We are interested in building a premium online presence and scaling our brand digitally.";

        const customMessage = message
          ? `Additional details: ${message}`
          : "We would like to discuss our business goals, digital presence, and the best next steps with your team.";

        const body = [
          intro,
          servicesLine,
          customMessage,
          "",
          "Consultation details:",
          `Business: ${business || "Not shared yet"}`,
          `Email: ${email || "Not shared yet"}`,
          `Consultation topic: ${topic}`,
          `Selected components: ${services.length ? services.join(", ") : "General consultation"}`
        ].join("\n");

        const subject = `${fromForm ? "New" : "Direct"} PixlUP consultation request${business ? ` - ${business}` : ""}`;
        const encodedTo = encodeURIComponent("teampixlup@gmail.com");
        const encodedSubject = encodeURIComponent(subject);
        const encodedBody = encodeURIComponent(body);
        const ua = navigator.userAgent || "";
        const isAndroid = /Android/i.test(ua);
        const isIOS = /iPhone|iPad|iPod/i.test(ua);

        if (isIOS) {
          return `googlegmail:///co?to=${encodedTo}&subject=${encodedSubject}&body=${encodedBody}`;
        }

        if (isAndroid) {
          return `intent://co?to=${encodedTo}&subject=${encodedSubject}&body=${encodedBody}#Intent;scheme=googlegmail;package=com.google.android.gm;end`;
        }

        return `https://mail.google.com/mail/?view=cm&fs=1&to=${encodedTo}&su=${encodedSubject}&body=${encodedBody}`;
      };

      const buildGmailWebUrl = (data, fromForm = false) => {
        const name = String(data.name || "").trim();
        const business = String(data.business || "").trim();
        const topic = String(data.consultation_topic || "Website Creation").trim();
        const message = String(data.message || "").trim();
        const services = Array.isArray(data.selected_services) ? data.selected_services : [];
        const intro = name
          ? `Hi PixlUP team, ${name} would like to consult you for ${topic.toLowerCase()}.`
          : `Hi PixlUP team, we want to consult you for ${topic.toLowerCase()}.`;
        const servicesLine = services.length
          ? `We are interested in: ${services.join(", ")}.`
          : "We are interested in building a premium online presence and scaling our brand digitally.";
        const customMessage = message
          ? `Additional details: ${message}`
          : "We would like to discuss our business goals, digital presence, and the best next steps with your team.";
        const body = [
          intro,
          servicesLine,
          customMessage,
          "",
          "Consultation details:",
          `Business: ${business || "Not shared yet"}`,
          `Email: ${String(data.email || "").trim() || "Not shared yet"}`,
          `Consultation topic: ${topic}`,
          `Selected components: ${services.length ? services.join(", ") : "General consultation"}`
        ].join("\n");
        const subject = `${fromForm ? "New" : "Direct"} PixlUP consultation request${business ? ` - ${business}` : ""}`;
        return `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent("teampixlup@gmail.com")}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      };

      const openGmailCompose = (data, fromForm = false) => {
        const gmailUrl = buildGmailDraft(data, fromForm);
        const webUrl = buildGmailWebUrl(data, fromForm);
        const ua = navigator.userAgent || "";
        const isMobile = /Android|iPhone|iPad|iPod/i.test(ua);

        if (isMobile) {
          window.location.href = gmailUrl;
          window.setTimeout(() => {
            if (document.visibilityState === "visible") {
              window.location.href = webUrl;
            }
          }, 900);
          return true;
        }

        const popup = window.open(gmailUrl, "_blank", "noopener,noreferrer");
        if (!popup) {
          window.location.href = webUrl;
        }
        return !!popup;
      };

      const handleSubmit = async (event) => {
        event.preventDefault();
        setSubmitting(true);
        setStatus({ type: "", message: "" });

        try {
          openGmailCompose(formState, true);

          setStatus({
            type: "success",
            message: "Your consultation draft is opening in Gmail with the selected topic and components already filled in."
          });
        } catch (error) {
          setStatus({
            type: "error",
            message: "Gmail could not be opened automatically. Use teampixlup@gmail.com directly if needed."
          });
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <section id="contact" className="mobile-tight-section relative overflow-hidden bg-pixlup-ink px-4 py-24 text-white sm:px-6 lg:px-8 lg:py-32">
          <div className="absolute right-0 top-0 h-[520px] w-[520px] rounded-full bg-pixlup-blue/15 blur-3xl"></div>
          <div className="relative mx-auto grid max-w-7xl gap-12 lg:grid-cols-[0.9fr_1.1fr]">
            <Reveal>
              <PixlupLogo inverted className="mb-10" />
              <div className="mb-4 text-sm font-extrabold uppercase tracking-[0.24em] text-pixlup-blue">Consultation</div>
              <h2 className="max-w-2xl text-4xl font-extrabold leading-[1.03] tracking-[-0.055em] sm:text-5xl lg:text-6xl">
                Ready To Turn Your Business Into A Modern Brand?
              </h2>
              <p className="mt-6 max-w-2xl text-lg leading-8 text-white/62">
                Tell us where your business is today. We will help map the brand, website, content, marketing, and growth systems needed to make it look premium and scale online.
              </p>
              <div className="mt-9 flex flex-col gap-4 sm:flex-row">
                <a href="#contact-form" className="inline-flex items-center justify-center rounded-full bg-white px-7 py-4 text-sm font-extrabold text-pixlup-ink transition hover:bg-pixlup-blue hover:text-white">
                  Book Growth Consultation
                </a>
                <button
                  type="button"
                  onClick={() => {
                    openGmailCompose(formState, false);
                  }}
                  className="inline-flex items-center justify-center rounded-full border border-white/14 bg-white/[0.055] px-7 py-4 text-sm font-bold text-white transition hover:bg-white/10"
                >
                  Contact Us
                </button>
              </div>
              <div className="mobile-tight-grid mt-10 grid gap-4 sm:grid-cols-2">
                <div className="rounded-[26px] border border-white/10 bg-white/[0.055] p-5">
                  <div className="text-xs font-extrabold uppercase tracking-[0.18em] text-white/38">Founders</div>
                  <div className="mt-4 space-y-2 text-sm font-bold text-white/80">
                    <div>Avanish Khandelwal</div>
                    <div>Mukund Gupta</div>
                  </div>
                </div>
                <div className="rounded-[26px] border border-white/10 bg-white/[0.055] p-5">
                  <div className="text-xs font-extrabold uppercase tracking-[0.18em] text-white/38">Business email</div>
                  <div className="mt-4 text-sm font-bold text-white/80">
                    <div>teampixlup@gmail.com</div>
                  </div>
                </div>
              </div>
            </Reveal>

            <Reveal delay={0.08} className="rounded-[38px] border border-white/10 bg-white/[0.065] p-4 shadow-card backdrop-blur-2xl">
              <form id="contact-form" className="rounded-[30px] border border-white/10 bg-pixlup-ink/64 p-6 sm:p-8" onSubmit={handleSubmit}>
                <div className="mb-8">
                  <h3 className="text-2xl font-extrabold tracking-[-0.045em]">Start with a quick brief.</h3>
                  <p className="mt-3 text-sm leading-6 text-white/50">Share the essentials and PixlUP will help map the right digital growth direction.</p>
                </div>
                <div className="grid gap-4 sm:grid-cols-2">
                  <label>
                    <span className="mb-2 block text-xs font-extrabold uppercase tracking-[0.16em] text-white/42">Name</span>
                    <input name="name" value={formState.name} onChange={handleFieldChange} className="form-field" placeholder="Your name" required />
                  </label>
                  <label>
                    <span className="mb-2 block text-xs font-extrabold uppercase tracking-[0.16em] text-white/42">Business</span>
                    <input name="business" value={formState.business} onChange={handleFieldChange} className="form-field" placeholder="Business name" required />
                  </label>
                  <label>
                    <span className="mb-2 block text-xs font-extrabold uppercase tracking-[0.16em] text-white/42">Email</span>
                    <input name="email" value={formState.email} onChange={handleFieldChange} className="form-field" type="email" placeholder="you@business.com" required />
                  </label>
                  <label>
                    <span className="mb-2 block text-xs font-extrabold uppercase tracking-[0.16em] text-white/42">Consultation topic</span>
                    <select name="consultation_topic" value={formState.consultation_topic} onChange={handleFieldChange} className="form-field" required>
                      <option className="text-black" value="Complete digital transformation">Complete digital transformation</option>
                      <option className="text-black" value="Branding and website">Branding and website</option>
                      <option className="text-black" value="Social media and content">Social media and content</option>
                      <option className="text-black" value="SEO, ads, and performance marketing">SEO, ads, and performance marketing</option>
                    </select>
                  </label>
                  <label className="sm:col-span-2">
                    <span className="mb-3 block text-xs font-extrabold uppercase tracking-[0.16em] text-white/42">Components selected</span>
                    <div className="grid gap-3 sm:grid-cols-2">
                      {serviceOptions.map((service) => {
                        const active = formState.selected_services.includes(service);
                        return (
                          <button
                            key={service}
                            type="button"
                            onClick={() => toggleService(service)}
                            className={`rounded-[18px] border px-4 py-3 text-left text-sm font-bold transition ${
                              active
                                ? "border-pixlup-blue bg-pixlup-blue/14 text-white"
                                : "border-white/10 bg-white/[0.04] text-white/68 hover:border-white/20 hover:text-white"
                            }`}
                          >
                            {service}
                          </button>
                        );
                      })}
                    </div>
                  </label>
                  <label className="sm:col-span-2">
                    <span className="mb-2 block text-xs font-extrabold uppercase tracking-[0.16em] text-white/42">Message</span>
                    <textarea name="message" value={formState.message} onChange={handleFieldChange} className="form-field min-h-[132px] resize-none" placeholder="Tell us about your business, current online presence, and what you want to grow." required></textarea>
                  </label>
                </div>
                {status.message && (
                  <div className={`mt-5 rounded-[20px] border px-4 py-3 text-sm font-semibold ${
                    status.type === "success"
                      ? "border-[#1F7A4C]/40 bg-[#1F7A4C]/14 text-white"
                      : "border-[#A73D3D]/40 bg-[#A73D3D]/14 text-white"
                  }`}>
                    {status.message}
                  </div>
                )}
                <button disabled={submitting} className="mt-6 inline-flex w-full items-center justify-center rounded-full bg-white px-7 py-4 text-sm font-extrabold text-pixlup-ink transition hover:bg-pixlup-blue hover:text-white disabled:cursor-not-allowed disabled:opacity-70">
                  {submitting ? "Opening Gmail..." : "Send Via Gmail"}
                </button>
                <a
                  href="https://www.instagram.com/buildwithpixlup/?hl=en"
                  target="_blank"
                  rel="noreferrer"
                  className="mt-3 inline-flex w-full items-center justify-center rounded-full border border-white/14 bg-white/[0.04] px-7 py-4 text-sm font-bold text-white transition hover:border-pixlup-blue hover:bg-white/[0.08]"
                >
                  Instagram
                </a>
              </form>
            </Reveal>
          </div>
        </section>
      );
    }

    function Footer() {
      const quickLinks = [
        ["Services", "#services"],
        ["Case Studies", "#portfolio"],
        ["Process", "#process"],
        ["Growth Packages", "#pricing"],
        ["Contact", "#contact"]
      ];
      const footerServices = ["Website Development", "Branding", "Digital Marketing", "Social Media", "Content Creation", "Performance Marketing", "SEO", "Growth Strategy"];

      return (
        <footer className="bg-[#030405] px-4 py-12 text-white sm:px-6 lg:px-8">
          <div className="mx-auto max-w-7xl">
            <div className="grid gap-10 border-b border-white/10 pb-10 md:grid-cols-[1.2fr_0.8fr_0.8fr_0.9fr]">
              <div>
                <PixlupLogo inverted />
                <p className="mt-5 max-w-sm text-sm leading-7 text-white/48">
                  PixlUP helps modern businesses become premium digital brands through strategy, websites, branding, content, marketing, SEO, ads, and social growth.
                </p>
              </div>
              <div>
                <h4 className="text-sm font-extrabold uppercase tracking-[0.18em] text-white/38">Quick links</h4>
                <div className="mt-5 space-y-3">
                  {quickLinks.map(([label, href]) => (
                    <a key={label} href={href} className="block text-sm font-semibold text-white/62 transition hover:text-white">{label}</a>
                  ))}
                </div>
              </div>
              <div>
                <h4 className="text-sm font-extrabold uppercase tracking-[0.18em] text-white/38">Services</h4>
                <div className="mt-5 space-y-3">
                  {footerServices.map((service) => (
                    <div key={service} className="text-sm font-semibold text-white/62">{service}</div>
                  ))}
                </div>
              </div>
              <div>
                <h4 className="text-sm font-extrabold uppercase tracking-[0.18em] text-white/38">Contact</h4>
                <div className="mt-5 space-y-3 text-sm font-semibold text-white/62">
                  <div>teampixlup@gmail.com</div>
                  <div>WhatsApp consultation</div>
                  <div className="flex gap-3 pt-2">
                    <a href="https://www.instagram.com/buildwithpixlup/?hl=en" target="_blank" rel="noreferrer" className="flex h-10 w-10 items-center justify-center rounded-full border border-white/10 text-xs font-extrabold text-white/62 transition hover:border-pixlup-blue hover:text-white">
                      Ig
                    </a>
                    {["In", "X"].map((item) => (
                      <a key={item} href="#" className="flex h-10 w-10 items-center justify-center rounded-full border border-white/10 text-xs font-extrabold text-white/62 transition hover:border-pixlup-blue hover:text-white">
                        {item}
                      </a>
                    ))}
                  </div>
                </div>
              </div>
            </div>
            <div className="flex flex-col justify-between gap-4 pt-7 text-sm text-white/38 md:flex-row">
              <div>© 2026 PixlUp. All rights reserved.</div>
              <div>Digital growth partner for modern businesses.</div>
            </div>
          </div>
        </footer>
      );
    }

    function App() {
      return (
        <>
          <CustomCursor />
          <AnnouncementBar />
          <Navbar />
          <main>
            <Hero />
            <Services />
            <WhyPixlup />
            <PortfolioShowcase />
            <Transformation />
            <MarketingSolutions />
            <SocialMediaGrowth />
            <Process />
            <Testimonials />
            <Pricing />
            <FAQ />
            <Founders />
            <ContactCTA />
          </main>
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
